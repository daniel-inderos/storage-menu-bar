name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      HAVE_SIGNING: ${{ secrets.DEVELOPER_ID_P12 != '' }}
    steps:
      - uses: actions/checkout@v5

      - name: Check tagged version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist)
          if [[ "$PLIST_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Info.plist CFBundleShortVersionString is $PLIST_VERSION, but tag ${GITHUB_REF_NAME} requires $TAG_VERSION. Bump Info.plist before tagging."
            exit 1
          fi

      - name: Import Developer ID certificate
        if: env.HAVE_SIGNING == 'true'
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo "$P12_BASE64" | base64 -d > cert.p12
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          rm -f cert.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain > /dev/null

      - name: Build StorageBar.app
        env:
          CODESIGN_IDENTITY: ${{ env.HAVE_SIGNING == 'true' && secrets.DEVELOPER_ID_IDENTITY || '-' }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            APP_VERSION="${GITHUB_REF_NAME}" ./build-app.sh
          else
            ./build-app.sh
          fi

      - name: Zip app bundle
        run: ditto -c -k --keepParent StorageBar.app StorageBar.zip

      - name: Notarize and staple
        if: env.HAVE_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool submit StorageBar.zip --wait \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$NOTARY_PASSWORD"
          xcrun stapler staple StorageBar.app
          # The stapled bundle is the shippable artifact: rebuild the zip so the
          # release asset and the Homebrew sha256 both see the stapled app.
          ditto -c -k --keepParent StorageBar.app StorageBar.zip
          spctl --assess --type execute --verbose StorageBar.app

      - name: Verify release artifact
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ARCHS="$(lipo -archs StorageBar.app/Contents/MacOS/StorageBar)"
          if [[ " $ARCHS " != *" x86_64 "* || " $ARCHS " != *" arm64 "* ]]; then
            echo "::error::Expected StorageBar.app to be universal with x86_64 and arm64, got: $ARCHS"
            exit 1
          fi
          BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" StorageBar.app/Contents/Info.plist)
          if [[ "$BUNDLE_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::StorageBar.app CFBundleShortVersionString is $BUNDLE_VERSION, but tag ${GITHUB_REF_NAME} requires $TAG_VERSION."
            exit 1
          fi

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        # Uses the REST API directly instead of `gh release create`, which has
        # intermittently returned 401s where raw API calls succeed.
        run: |
          TAG="${GITHUB_REF_NAME}"
          if RELEASE_ID=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq .id 2>/dev/null); then
            echo "Reusing release ${RELEASE_ID}"
          else
            RELEASE_ID=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/releases" \
              -f tag_name="${TAG}" \
              -f name="StorageBar ${TAG}" \
              -F generate_release_notes=true --jq .id)
          fi
          gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" \
            --jq '.[] | select(.name == "StorageBar.zip") | .id' |
            while read -r ASSET_ID; do
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}"
            done
          curl -sf -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/zip" \
            --data-binary @StorageBar.zip \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=StorageBar.zip" \
            --output /dev/null

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          SHA=$(shasum -a 256 StorageBar.zip | cut -d' ' -f1)
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p ~/.ssh
          echo "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          # Trust GitHub's SSH host keys via the TLS-authenticated meta API
          # instead of trust-on-first-use ssh-keyscan.
          curl -fsSL https://api.github.com/meta \
            | jq -r '.ssh_keys[] | "github.com \(.)"' > ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"
          git clone git@github.com:daniel-inderos/homebrew-tap.git tap
          cd tap
          sed -i '' \
            -e "s/^  version .*/  version \"$VERSION\"/" \
            -e "s/^  sha256 .*/  sha256 \"$SHA\"/" \
            Casks/storagebar.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "storagebar $VERSION"
          git push

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Build StorageBar.app
        run: ./build-app.sh

      - name: Zip app bundle
        run: ditto -c -k --keepParent StorageBar.app StorageBar.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" StorageBar.zip \
            --title "StorageBar ${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          SHA=$(shasum -a 256 StorageBar.zip | cut -d' ' -f1)
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p ~/.ssh
          echo "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"
          git clone git@github.com:daniel-inderos/homebrew-tap.git tap
          cd tap
          sed -i '' \
            -e "s/^  version .*/  version \"$VERSION\"/" \
            -e "s/^  sha256 .*/  sha256 \"$SHA\"/" \
            Casks/storagebar.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "storagebar $VERSION"
          git push
